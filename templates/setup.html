{% extends "base.html" %}
{% block title %}Join - Discogs Recommender{% endblock %}

{% block content %}
<article style="max-width: 500px; margin: 2rem auto;">
    <header>
        <h2>Welcome! Set up your account</h2>
    </header>

    {% if error %}
    <p style="color: var(--pico-del-color);"><strong>{{ error }}</strong></p>
    {% endif %}

    <form method="post" action="/invite/{{ token }}">
        <label for="display_name">Display Name *</label>
        <input type="text" id="display_name" name="display_name"
               placeholder="Your name" required maxlength="100">

        <details>
            <summary>Connect your own Discogs account (optional)</summary>
            <p><small>Leave blank to use the shared collection.</small></p>

            <label for="discogs_username">Discogs Username</label>
            <input type="text" id="discogs_username" name="discogs_username"
                   placeholder="Your Discogs username" maxlength="100">

            <label for="discogs_token">Discogs Personal Access Token</label>
            <input type="password" id="discogs_token" name="discogs_token"
                   placeholder="From discogs.com/settings/developers" maxlength="200">
        </details>

        <button type="submit" style="margin-top: 1rem;">Join</button>
    </form>
</article>
{% endblock %}
