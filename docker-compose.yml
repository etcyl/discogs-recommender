services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false  # App works without .env (zero-config mode)
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  # Uncomment to run Ollama as a container (free local AI):
